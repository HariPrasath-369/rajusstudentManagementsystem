version: '3.8'

services:
  db:
    image: postgres:15
    container_name: sms-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sms_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: sms-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
