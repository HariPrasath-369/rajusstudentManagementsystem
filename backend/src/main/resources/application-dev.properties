# ==============================
# DATABASE CONFIG
# ==============================
spring.datasource.url=jdbc:postgresql://db.bgdwmcdtalvffzxxbyjf.supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximumPoolSize=10
spring.datasource.hikari.minimumIdle=5
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.idleTimeout=600000
spring.datasource.hikari.maxLifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1


# ==============================
# FLYWAY
# ==============================
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0


# ==============================
# JPA / HIBERNATE
# ==============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.use_sql_comments=true


# ==============================
# REDIS
# ==============================
spring.data.redis.host=needed-redfish-80915.upstash.io
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.database=0
spring.data.redis.timeout=5000ms
spring.data.redis.ssl.enabled=true

spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0


# ==============================
# JWT
# ==============================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000


# ==============================
# MAIL CONFIG
# ==============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

spring.mail.default-encoding=UTF-8
spring.mail.test-connection=false


# ==============================
# LOGGING
# ==============================
logging.level.com.university.sms=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.web=DEBUG

logging.file.name=logs/sms-application.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n


# ==============================
# SUPABASE
# ==============================
app.supabase.url=https://bgdwmcdtalvffzxxbyjf.supabase.co
app.supabase.anon-key=${SUPABASE_ANON_KEY}
app.supabase.service-role-key=${SUPABASE_SERVICE_KEY}

app.supabase.storage.url=${app.supabase.url}/storage/v1
app.supabase.storage.public-url=${app.supabase.url}/storage/v1/object/public

app.supabase.storage.bucket.study-materials=study-materials
app.supabase.storage.bucket.profile-pictures=profile-pictures
app.supabase.storage.bucket.assignments=assignments
app.supabase.storage.bucket.temp=temp


# ==============================
# FILES & BACKUP
# ==============================
app.file.upload-dir=./uploads-dev
app.backup.directory=./backups
app.backup.enabled=false


# ==============================
# CACHE
# ==============================
spring.cache.type=none


# ==============================
# FEATURES
# ==============================
app.features.auto-timetable=true
app.features.ai-predictions=true
app.features.qr-attendance=true
app.features.email-notifications=true
app.rate-limit.enabled=false


# ==============================
# OPENAI CONFIG
# ==============================
openai.api.key=${OPENAI_API_KEY}
openai.api.url=https://api.openai.com/v1

openai.model.default=gpt-3.5-turbo
openai.model.analysis=gpt-3.5-turbo-16k
openai.max-tokens=2000
openai.temperature=0.7
openai.enabled=true


# ==============================
# CORS
# ==============================
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001


# ==============================
# DEVTOOLS
# ==============================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true


# ==============================
# ACTUATOR
# ==============================
management.endpoints.web.exposure.include=*
management.endpoint.shutdown.enabled=true


# ==============================
# SWAGGER
# ==============================
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true