server.servlet.session.timeout=30m
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

spring.datasource.url=jdbc:postgresql://db.bgdwmcdtalvffzxxbyjf.supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximumPoolSize=20
spring.datasource.hikari.minimumIdle=10
spring.datasource.hikari.connectionTimeout=10000

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=50

spring.data.redis.host=needed-redfish-80915.upstash.io
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.database=0
spring.data.redis.ssl.enabled=true
spring.data.redis.timeout=5000ms

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.supabase.url=https://bgdwmcdtalvffzxxbyjf.supabase.co
app.supabase.anon-key=${SUPABASE_ANON_KEY}
app.supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY}
app.supabase.storage.bucket.study-materials=study-materials

spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
spring.cache.redis.cache-null-values=false

app.features.auto-timetable=true
app.features.ai-predictions=true
app.features.qr-attendance=true
app.features.email-notifications=true
app.rate-limit.enabled=true
app.rate-limit.limit=100
app.rate-limit.duration=60

openai.api.key=${OPENAI_API_KEY}
openai.enabled=true

logging.level.com.university.sms=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=ERROR
logging.file.name=/var/log/sms/application.log
logging.file.max-size=100MB
logging.file.max-history=30

server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}
server.ssl.key-store-type=PKCS12

server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never

springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false
