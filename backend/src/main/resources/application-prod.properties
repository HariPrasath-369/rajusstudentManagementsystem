server.servlet.session.timeout=30m
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

# Use Supabase connection pooler (port 6543) - required for cloud deployments like Render
# pgbouncer=true disables prepared statements which are incompatible with PgBouncer in transaction mode
spring.datasource.url=jdbc:postgresql://db.bgdwmcdtalvffzxxbyjf.supabase.co:6543/postgres?pgbouncer=true&sslmode=require
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximumPoolSize=5
spring.datasource.hikari.minimumIdle=2
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.idleTimeout=600000
spring.datasource.hikari.maxLifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1

# Flyway - disabled (tables managed by JPA)
spring.flyway.enabled=false

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
# Disable prepared statements for PgBouncer compatibility
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=false

spring.data.redis.host=${REDIS_HOST:needed-redfish-80915.upstash.io}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.database=0
spring.data.redis.ssl.enabled=true
spring.data.redis.timeout=5000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.test-connection=false

app.supabase.url=https://bgdwmcdtalvffzxxbyjf.supabase.co
app.supabase.anon-key=${SUPABASE_ANON_KEY}
app.supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY}
app.supabase.storage.url=${app.supabase.url}/storage/v1
app.supabase.storage.public-url=${app.supabase.url}/storage/v1/object/public
app.supabase.storage.bucket.study-materials=study-materials
app.supabase.storage.bucket.profile-pictures=profile-pictures
app.supabase.storage.bucket.assignments=assignments
app.supabase.storage.bucket.temp=temp

spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
spring.cache.redis.cache-null-values=false

app.features.auto-timetable=true
app.features.ai-predictions=true
app.features.qr-attendance=true
app.features.email-notifications=true
app.rate-limit.enabled=false

openai.api.key=${OPENAI_API_KEY}
openai.api.url=https://api.openai.com/v1
openai.model.default=gpt-3.5-turbo
openai.model.analysis=gpt-3.5-turbo-16k
openai.max-tokens=2000
openai.temperature=0.7
openai.enabled=true

logging.level.com.university.sms=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=ERROR
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# SSL disabled - Render handles SSL termination at the edge
server.ssl.enabled=false

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://your-frontend.onrender.com}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

app.file.upload-dir=/tmp/uploads
app.backup.directory=/tmp/backups
app.backup.enabled=false
